<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="QuantumChat — E2E Secure Messaging for Software Engineers with client-side X25519 key management" />
    <meta name="color-scheme" content="dark light" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme') || localStorage.getItem('qc-theme') || 'dark';
          document.documentElement.setAttribute('data-theme', stored);
          document.body.classList.remove('theme-light', 'theme-dark', 'theme-eyecare');
          document.body.classList.add('theme-' + stored);
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>QuantumChat // Secured Developer Hub</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
